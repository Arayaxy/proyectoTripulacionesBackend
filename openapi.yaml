openapi: "3.0.3"
info:
  title: API Proyecto Tripulaciones
  description: API backend del ERP de Eventos
  version: "0.0.1"

servers:
  - url: http://localhost:3000/api/v1
    description: Desarrollo local

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    FirebaseToken:
      type: apiKey
      in: header
      name: Authorization
      description: "Firebase ID Token: Bearer <firebase_id_token>"

  responses:
    Unauthorized:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    OkResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        msg: { type: string, example: "Has accedido a obtener todos los eventos" }
        filters: { type: object }
        data: { type: object }

    ErrorResponse:
      type: object
      properties:
        ok: { type: boolean, example: false }
        message: { type: string, example: "Evento no encontrado" }

    ValidationError:
      type: object
      properties:
        ok: { type: boolean, example: false }
        message: { type: string, example: "Error de validacion" }
        errors:
          type: object

    UUID:
      type: string
      format: uuid
      example: bdfe40ca-70e8-4fe6-8907-df4a5a7bd3e6

    Estado:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        descripcion: { type: string }
    EstadoResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Estado"

    Usuario:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        nombreUsuario: { type: string }
        rol: { type: string }
    UsuarioResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Usuario"

    Presupuesto:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        estadoPresupuesto: { type: boolean }
        total: { type: number }
        fecha: { type: string, format: date-time }
        notaUbicacion: { type: string, nullable: true }
        precioUbicacion: { type: number }
        catering: { type: boolean }
        notaCatering: { type: string, nullable: true }
        precioCatering: { type: number }
        audiovisuales: { type: boolean }
        notaAudiovisuales: { type: string, nullable: true }
        precioAudiovisuales: { type: number }
        otros: { type: boolean }
        notaOtros: { type: string, nullable: true }
        precioOtros: { type: number }
        observaciones: { type: string, nullable: true }
    PresupuestoResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Presupuesto"

    Cliente:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        cliente: { type: string }
        email: { type: string, format: email }
        telefono: { type: string, nullable: true }
        empresa: { type: string, nullable: true }
        sector: { type: string, nullable: true }
        ciudad: { type: string, nullable: true }
    ClienteResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Cliente"

    Evento:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        nombreEvento: { type: string }
        ciudad: { type: string, nullable: true }
        lugarConfirmado: { type: boolean }
        fechaInicio: { type: string, format: date-time, nullable: true }
        fechaFin: { type: string, format: date-time, nullable: true }
        numeroPersonas: { type: integer, nullable: true }
        tipoEvento: { type: string, nullable: true }
        nota: { type: string, nullable: true }
        idCliente:
          $ref: "#/components/schemas/UUID"
        idEstado:
          $ref: "#/components/schemas/UUID"
        idPresupuesto:
          $ref: "#/components/schemas/UUID"
        idSala:
          $ref: "#/components/schemas/UUID"
        idPonencia:
          $ref: "#/components/schemas/UUID"
    EventoResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Evento"

    Espacio:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        nombreEspacio: { type: string }
        ciudad: { type: string, nullable: true }
        direccion: { type: string, nullable: true }
        aforo: { type: integer, nullable: true }
        nota: { type: string, nullable: true }
        telefonoContacto: { type: string, nullable: true }
        nombreContacto: { type: string, nullable: true }
        emailContacto: { type: string, format: email, nullable: true }
    EspacioResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Espacio"

    Ponente:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        nombrePonente: { type: string }
        docuIdentificacion: { type: string, nullable: true }
        email: { type: string, format: email }
        sector: { type: string, nullable: true }
        telefono: { type: string, nullable: true }
        fotoLink: { type: string, nullable: true }
        cvLink: { type: string, nullable: true }
        empresa: { type: string, nullable: true }
        cargo: { type: string, nullable: true }
    PonenteResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Ponente"

    Sala:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        nombreSala: { type: string }
        tipoSala: { type: string }
        capacidadMaxSala: { type: integer }
        notaSala: { type: string, nullable: true }
        idEspacio:
          $ref: "#/components/schemas/UUID"
    SalaResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Sala"

    Ponencia:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        nombreHotel: { type: string }
        notaTransporte: { type: string, nullable: true }
        horarioIdaTransporte: { type: string, format: date-time, nullable: true }
        horarioVueltaTransporte: { type: string, format: date-time, nullable: true }
        localizacionHotel: { type: string }
        horarioPonencia: { type: string, format: date-time }
        checkinHorario: { type: string, format: date-time }
        ponenteEstado: { type: string }
        presentacionLink: { type: string, nullable: true }
        billeteIdaLink: { type: string, nullable: true }
        billeteVueltaLink: { type: string, nullable: true }
        tipoPonencia: { type: string }
        idPonente:
          $ref: "#/components/schemas/UUID"
    PonenciaResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Ponencia"

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Servidor operativo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /debug/force-error:
    get:
      tags: [Debug]
      summary: Fuerza un error (solo development)
      responses:
        "500":
          description: Error interno simulado

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión con Firebase
      security:
        - FirebaseToken: []
      responses:
        "200":
          description: Sesión iniciada, JWT en cookie httpOnly
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user:
                    type: object
                    properties:
                      userId:
                        $ref: "#/components/schemas/UUID"
                      name: { type: string }
                      email: { type: string }
                      role: { type: string }
        "400":
          description: Token no enviado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/verify:
    get:
      tags: [Auth]
      summary: Verificar sesión activa
      responses:
        "200":
          description: Sesión válida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión
      responses:
        "200":
          description: Sesión cerrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /eventos:
    get:
      tags: [Eventos]
      summary: Listar/filtrar eventos
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: ciudad
          schema: { type: string }
        - in: query
          name: tipoEvento
          schema: { type: string }
        - in: query
          name: idEstado
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista de eventos
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Evento"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Eventos]
      summary: Crear evento
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombreEvento, idCliente, idEstado]
              properties:
                nombreEvento: { type: string }
                ciudad: { type: string }
                lugarConfirmado: { type: boolean }
                fechaInicio: { type: string, format: date-time }
                fechaFin: { type: string, format: date-time }
                numeroPersonas: { type: integer }
                tipoEvento: { type: string }
                nota: { type: string }
                idCliente: { type: string, format: uuid }
                idEstado: { type: string, format: uuid }
                idPresupuesto: { type: string, format: uuid }
                idSala: { type: string, format: uuid }
                idPonencia: { type: string, format: uuid }
      responses:
        "201":
          description: Evento creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventoResponse"
        "400":
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /eventos/{id}:
    get:
      tags: [Eventos]
      summary: Obtener evento por ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Evento encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Eventos]
      summary: Actualizar evento
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nombreEvento: { type: string }
                ciudad: { type: string }
                lugarConfirmado: { type: boolean }
                fechaInicio: { type: string, format: date-time }
                fechaFin: { type: string, format: date-time }
                numeroPersonas: { type: integer }
                tipoEvento: { type: string }
                nota: { type: string }
                idCliente: { type: string, format: uuid }
                idEstado: { type: string, format: uuid }
                idPresupuesto: { type: string, format: uuid }
                idSala: { type: string, format: uuid }
                idPonencia: { type: string, format: uuid }
      responses:
        "200":
          description: Evento actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Eventos]
      summary: Eliminar evento
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Evento eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /clientes:
    get:
      tags: [Clientes]
      summary: Listar/filtrar clientes
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: sector
          schema: { type: string }
        - in: query
          name: ciudad
          schema: { type: string }
      responses:
        "200":
          description: Lista de clientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Cliente"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Clientes]
      summary: Crear cliente
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cliente, email]
              properties:
                cliente: { type: string }
                email: { type: string, format: email }
                telefono: { type: string }
                empresa: { type: string }
                sector: { type: string }
                ciudad: { type: string }
      responses:
        "201":
          description: Cliente creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "400":
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /clientes/{id}:
    get:
      tags: [Clientes]
      summary: Obtener cliente por ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Clientes]
      summary: Actualizar cliente
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cliente: { type: string }
                email: { type: string, format: email }
                telefono: { type: string }
                empresa: { type: string }
                sector: { type: string }
                ciudad: { type: string }
      responses:
        "200":
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Clientes]
      summary: Eliminar cliente
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Cliente eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /espacios/buscar:
    get:
      tags: [Espacios]
      summary: Buscar espacios y salas por capacidad
      parameters:
        - in: query
          name: min
          schema: { type: integer, minimum: 0 }
          description: Capacidad mínima (opcional, default 0)
        - in: query
          name: max
          schema: { type: integer, minimum: 0 }
          description: Capacidad máxima (opcional, default 999999)
      responses:
        "200":
          description: Espacios y salas que cumplen el rango de capacidad
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      espacios:
                        type: array
                        items:
                          $ref: "#/components/schemas/Espacio"
                      salas:
                        type: array
                        items:
                          $ref: "#/components/schemas/Sala"

  /espacios:
    get:
      tags: [Espacios]
      summary: Listar/filtrar espacios
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: ciudad
          schema: { type: string }
        - in: query
          name: aforo
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Lista de espacios
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Espacio"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Espacios]
      summary: Crear espacio
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombreEspacio]
              properties:
                nombreEspacio: { type: string }
                ciudad: { type: string }
                direccion: { type: string }
                aforo: { type: integer }
                nota: { type: string }
                telefonoContacto: { type: string }
                nombreContacto: { type: string }
                emailContacto: { type: string, format: email }
      responses:
        "201":
          description: Espacio creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EspacioResponse"
        "400":
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /espacios/{id}:
    get:
      tags: [Espacios]
      summary: Obtener espacio por ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Espacio encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EspacioResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Espacios]
      summary: Actualizar espacio
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nombreEspacio: { type: string }
                ciudad: { type: string }
                direccion: { type: string }
                aforo: { type: integer }
                nota: { type: string }
                telefonoContacto: { type: string }
                nombreContacto: { type: string }
                emailContacto: { type: string, format: email }
      responses:
        "200":
          description: Espacio actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EspacioResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Espacios]
      summary: Eliminar espacio
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Espacio eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /ponentes:
    get:
      tags: [Ponentes]
      summary: Listar/filtrar ponentes
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: sector
          schema: { type: string }
      responses:
        "200":
          description: Lista de ponentes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Ponente"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Ponentes]
      summary: Crear ponente (con foto)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [nombrePonente, email]
              properties:
                nombrePonente:
                  type: string
                docuIdentificacion:
                  type: string
                email:
                  type: string
                  format: email
                sector:
                  type: string
                telefono:
                  type: string
                empresa:
                  type: string
                cargo:
                  type: string
                file:
                  type: string
                  format: binary
                  description: Foto de perfil (opcional)
      responses:
        "201":
          description: Ponente creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PonenteResponse"
        "400":
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ponentes/{id}:
    get:
      tags: [Ponentes]
      summary: Obtener ponente por ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Ponente encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PonenteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Ponentes]
      summary: Actualizar ponente (con foto)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        content:
          multipart/form-data:
            schema:
